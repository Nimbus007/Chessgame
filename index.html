<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firebase Realtime Chess</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 1050px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
    }

    .board-wrap,
    .panel {
      background: #1f2937;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 14px;
      font-size: 26px;
    }

    .status {
      margin-bottom: 14px;
      padding: 12px;
      border-radius: 12px;
      background: #374151;
      line-height: 1.4;
    }

    .board {
      width: min(90vw, 680px);
      height: min(90vw, 680px);
      max-width: 680px;
      max-height: 680px;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      border: 4px solid #111827;
      border-radius: 12px;
      overflow: hidden;
      user-select: none;
    }

    .square {
      display: flex;
      justify-content: center;
</html>
